<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="container auth-card-wrapper">
    <div class="card auth-card">
        <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">Đăng nhập</h3>
                    <p class="text-muted">Course Registration Application</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> Tên đăng nhập hoặc mật khẩu không đúng!
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    <i class="bi bi-check-circle"></i> Đã đăng xuất thành công!
                </div>
                <div th:if="${success}" class="alert alert-success">
                    <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Nhập tên đăng nhập" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                    </button>
                </form>

                <div class="mb-3 text-center text-muted">hoặc</div>

                <a class="btn btn-outline-dark w-100 mb-3 d-flex align-items-center justify-content-center gap-2"
                   th:href="@{/oauth2/authorization/google}">
                    <i class="bi bi-google"></i>
                    <span>Đăng nhập bằng Google</span>
                </a>

                <div class="text-center">
                    <p class="mb-0">Chưa có tài khoản?
                        <a th:href="@{/register}" class="text-decoration-none">Đăng ký ngay</a>
                    </p>
                    <a th:href="@{/home}" class="text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
