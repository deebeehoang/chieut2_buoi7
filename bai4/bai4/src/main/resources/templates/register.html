<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="container auth-card-wrapper">
    <div class="card auth-card">
        <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">Đăng ký tài khoản</h3>
                    <p class="text-muted">Tạo tài khoản sinh viên mới</p>
                </div>

                <div th:if="${error}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Username <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Password <span class="text-danger">*</span>
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope"></i> Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="Nhập email (không bắt buộc)">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="bi bi-person-plus"></i> Đăng ký
                    </button>
                </form>

                <div class="text-center">
                    <p class="mb-0">Đã có tài khoản?
                        <a th:href="@{/login}" class="text-decoration-none">Đăng nhập</a>
                    </p>
                    <a th:href="@{/home}" class="text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
