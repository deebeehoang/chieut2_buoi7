<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý học phần - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> Course Registration
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        <i class="bi bi-house"></i> Trang chủ
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/courses}">
                        <i class="bi bi-gear"></i> Quản lý học phần
                    </a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">
                                    <i class="bi bi-box-arrow-right"></i> Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-book"></i> Quản lý học phần</h2>
        <a th:href="@{/admin/courses/create}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Thêm học phần
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-info">
        <i class="bi bi-info-circle"></i> Chưa có học phần nào.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(courses)}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên học phần</th>
                    <th>Số tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Danh mục</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}">1</td>
                    <td>
                        <img th:if="${course.image != null && !course.image.isEmpty()}"
                             th:src="@{'/images/' + ${course.image}}"
                             alt="Course" style="width: 80px; height: 50px; object-fit: cover; border-radius: 5px;">
                        <span th:unless="${course.image != null && !course.image.isEmpty()}"
                              class="text-muted">N/A</span>
                    </td>
                    <td th:text="${course.name}">Course Name</td>
                    <td><span class="badge bg-primary" th:text="${course.credits}">3</span></td>
                    <td th:text="${course.lecturer}">Lecturer</td>
                    <td th:text="${course.category != null ? course.category.name : 'N/A'}">Category</td>
                    <td>
                        <a th:href="@{'/admin/courses/edit/' + ${course.id}}"
                           class="btn btn-warning btn-sm me-1">
                            <i class="bi bi-pencil"></i> Sửa
                        </a>
                        <a th:href="@{'/admin/courses/delete/' + ${course.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa học phần này?')">
                            <i class="bi bi-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 Course Registration Application</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
