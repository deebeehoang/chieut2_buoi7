<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> Course Registration
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/courses}">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> Sửa học phần</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{'/admin/courses/edit/' + ${course.id}}" method="post"
                          th:object="${course}" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label for="name" class="form-label">Tên học phần <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" th:field="*{name}">
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger small"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="credits" class="form-label">Số tín chỉ <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="credits" th:field="*{credits}" min="1">
                                <div th:if="${#fields.hasErrors('credits')}" class="text-danger small"
                                     th:errors="*{credits}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="categoryId" class="form-label">Danh mục</label>
                                <select class="form-select" id="categoryId" name="categoryId">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:selected="${course.category != null && course.category.id == cat.id}"
                                            th:text="${cat.name}">Category</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="lecturer" class="form-label">Giảng viên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="lecturer" th:field="*{lecturer}">
                            <div th:if="${#fields.hasErrors('lecturer')}" class="text-danger small"
                                 th:errors="*{lecturer}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh hiện tại</label>
                            <div th:if="${course.image != null && !course.image.isEmpty()}">
                                <img th:src="@{'/images/' + ${course.image}}"
                                     class="img-thumbnail" style="max-height: 150px;" alt="Current Image">
                            </div>
                            <div th:unless="${course.image != null && !course.image.isEmpty()}"
                                 class="text-muted">Chưa có ảnh</div>
                        </div>

                        <div class="mb-3">
                            <label for="imageFile" class="form-label">Thay đổi hình ảnh</label>
                            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                            <small class="text-muted">Để trống nếu không muốn thay đổi</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle"></i> Cập nhật
                            </button>
                            <a th:href="@{/admin/courses}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
